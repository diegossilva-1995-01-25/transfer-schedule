<main class="main">
  <div class="content">

    <div class="topo">

      <button class="top-buttons" [ngClass]="{ 'deactivate': telaAtual() != 'registrar' && telaAtual() != 'login' }" (click)="redirectLogin()"> <span class="mdi mdi-home"></span> </button>

      <button class="top-buttons" [ngClass]="{ 'deactivate': telaAtual() == 'registrar' || telaAtual() == 'login' }" (click)="redirectMenu()"> <span class="mdi mdi-home"></span> </button>

      <div class="title-app">Transfer Schedule</div>

      <button class="top-buttons" [ngClass]="{ 'deactivate': telaAtual() != 'registrar' && telaAtual() != 'login' }" (click)="redirectLogin()"> <span class="mdi mdi-login"></span> </button>

      <button class="top-buttons" [ngClass]="{ 'deactivate': telaAtual() == 'registrar' || telaAtual() == 'login' }" (click)="redirectLogin()"> <span class="mdi mdi-logout"></span> </button>

    </div>

    <div class="middle">

      <router-outlet></router-outlet>

    </div>

  </div>
  
</main>
