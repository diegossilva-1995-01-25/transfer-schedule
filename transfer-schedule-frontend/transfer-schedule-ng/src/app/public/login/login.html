<div class="container">

    <form class="form-login">

        <div class="linha">

            <label for="cpf" class="lbl">CPF</label>
            <input id="cpf" type="number" class="txt" />

        </div>

        <div class="linha">

            <label for="senha" class="lbl">Senha</label>
            <input id="senha" type="password" class="txt" />

        </div>

        <div class="linha-botoes">

            <button class="green"> <span class="mdi mdi-check-bold"></span> </button>
            <button class="blue" (click)="redirectRegistrar()"> <span class="mdi mdi-account-plus"></span> </button>

        </div>

    </form>

</div>
