<div class="container">
  <form class="form-new" [formGroup]="form" (ngSubmit)="onSubmit()">

    <div class="linha">
      <label for="nome" class="lbl">Nome</label>
      <input id="nome" type="text" class="txt" formControlName="nome" />
    </div>

    <div class="linha">
      <label for="cpf" class="lbl">CPF</label>
      <input id="cpf" type="text" class="txt" formControlName="cpf" />
    </div>

    <div class="linha">
      <label for="senha" class="lbl">Senha</label>
      <input id="senha" type="password" class="txt" formControlName="senha" />
    </div>

    <div class="linha">
      <label for="confSenha" class="lbl">Confirmar Senha</label>
      <input id="confSenha" type="password" class="txt" formControlName="confSenha" />
    </div>

    <div class="linha-botoes">
      <button class="green" type="submit" [disabled]="form.invalid">
        <span class="mdi mdi-content-save"></span>
      </button>
      <button class="red" type="button" (click)="redirectLogin()">
        <span class="mdi mdi-close"></span>
      </button>
    </div>

  </form>
</div>
